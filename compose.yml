services:
  komventory:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: komventory:dev
    container_name: komventory
    # Stable hostname so the cross-process lock file shows a recognisable
    # holder ("komventory-container") instead of a random Docker name.
    hostname: komventory-container
    # Run as the host user so files created in bind mounts (ledger, media,
    # log.md, model cache) are owned by you, not root. Change to match `id -u/-g`
    # on your host if not 1000:1000.
    user: "1000:1000"
    volumes:
      - ./data:/data
      - ./src:/app/src                          # hot-reload during dev
      # Phone-sync sources, read-only. Edit these two paths if your shares live elsewhere.
      - /home/koom/d/sync/a22-recordings/Recording:/sources/audio:ro
      - /home/koom/d/sync/a22dcim/OpenCamera:/sources/video:ro
      # Peer clone of data/log/ that the host keeps in sync. Mounted at the same path as
      # on the host so git remote URLs (e.g. `/home/koom/log`) resolve identically from
      # both sides. Read/write so `git pull` can write into its ref/object store if it
      # ever acts as the upstream.
      - /home/koom/log:/home/koom/log
      # Host gitconfig (for user.name/user.email on commits) mounted system-wide so
      # the container reads it regardless of HOME. Read-only.
      - /home/koom/.gitconfig:/etc/gitconfig:ro
    environment:
      # Point ingest at the bind-mounted sources rather than data/inbox/{audio,video}.
      KOMVENTORY_INBOX_AUDIO: /sources/audio
      KOMVENTORY_INBOX_VIDEO: /sources/video
      # Phone and host both run Europe/Prague — interpret filename timestamps in that zone
      # and have the container clock match so logs/mtime are intuitive.
      TZ: Europe/Prague
      KOMVENTORY_TIMEZONE: Europe/Prague
      # Distinct git identity for commits made by the containerised watcher, so a quick
      # `git log` makes it obvious which commits came from the bot vs. you on the host.
      GIT_AUTHOR_NAME: komventory
      GIT_AUTHOR_EMAIL: komventory@container.local
      GIT_COMMITTER_NAME: komventory
      GIT_COMMITTER_EMAIL: komventory@container.local
      # Whisper model. Defaults to Systran's published large-v3 (CT2-ready, auto-downloads).
      # For better Czech orthography, switch to a Czech finetune from Hugging Face:
      #   1) on the host:  uv sync --extra convert
      #   2)               uv run komventory convert-model mikr/whisper-large-v3-turbo-cs-cv17
      #   3) change this to the same name:
      #        KOMVENTORY_WHISPER_MODEL: mikr/whisper-large-v3-turbo-cs-cv17
      KOMVENTORY_WHISPER_MODEL: mikr/whisper-large-v3-czech-cv13
      KOMVENTORY_WHISPER_LANG: cs
      KOMVENTORY_WHISPER_COMPUTE: int8
    restart: unless-stopped
    # Default: watch inbox/. Override for one-shot:
    #   docker compose run --rm komventory komventory ingest
    command: ["komventory", "watch"]

  caddy:
    image: caddy:2-alpine
    container_name: komventory-caddy
    # Browser-friendly view of the rendered log:  http://localhost:3410/
    ports:
      - "3410:3410"
    volumes:
      - ./data/log:/srv:ro
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
    restart: unless-stopped
